<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Альтрон</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0A0A0F; color: #E0E0E0; overflow: hidden; }
        .container { display: flex; flex-direction: column; height: 100vh; background: linear-gradient(180deg, #0A0A0F 0%, #1A0A0A 50%, #0F0A15 100%); }
        .header { padding: 14px 16px; background: rgba(180, 30, 30, 0.15); border-bottom: 1px solid rgba(180, 30, 30, 0.3); display: flex; align-items: center; gap: 10px; }
        .header-icon { width: 32px; height: 32px; border-radius: 50%; background: radial-gradient(circle, #FF3030 0%, #8B0000 70%); box-shadow: 0 0 12px rgba(255, 30, 30, 0.5); animation: pulse-glow 2s infinite; }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 12px rgba(255, 30, 30, 0.5); } 50% { box-shadow: 0 0 20px rgba(255, 30, 30, 0.8); } }
        .header h1 { font-size: 18px; font-weight: 700; color: #FF4040; text-transform: uppercase; letter-spacing: 2px; }
        .chat-box { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .chat-box::-webkit-scrollbar { width: 4px; }
        .chat-box::-webkit-scrollbar-thumb { background: rgba(180, 30, 30, 0.3); border-radius: 2px; }
        .message { display: flex; animation: slideIn 0.3s ease-out; }
        .message.user { justify-content: flex-end; }
        .message.ai { justify-content: flex-start; }
        .message-content { max-width: 82%; padding: 10px 14px; border-radius: 14px; word-wrap: break-word; line-height: 1.5; font-size: 14px; white-space: pre-wrap; }
        .message.user .message-content { background: rgba(180, 30, 30, 0.4); color: #F0F0F0; border: 1px solid rgba(180, 30, 30, 0.5); border-bottom-right-radius: 4px; }
        .message.ai .message-content { background: rgba(255, 255, 255, 0.07); color: #D0D0D0; border: 1px solid rgba(255, 255, 255, 0.1); border-bottom-left-radius: 4px; }
        .typing-indicator { display: flex; gap: 10px; align-items: center; padding: 12px 16px; background: rgba(255, 255, 255, 0.07); border-radius: 14px; border-bottom-left-radius: 4px; border: 1px solid rgba(255, 255, 255, 0.1); width: fit-content; }
        .typing-indicator img { width: 40px; height: 40px; border-radius: 50%; }
        .typing-indicator span { color: #888; font-style: italic; font-size: 14px; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .input-section { display: flex; gap: 8px; padding: 12px 16px; background: rgba(15, 15, 20, 0.95); border-top: 1px solid rgba(180, 30, 30, 0.2); }
        input { flex: 1; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(180, 30, 30, 0.3); border-radius: 20px; padding: 10px 16px; font-size: 14px; outline: none; color: #E0E0E0; }
        input::placeholder { color: #666; }
        input:focus { border-color: #FF4040; box-shadow: 0 0 8px rgba(255, 40, 40, 0.2); }
        button { background: linear-gradient(135deg, #B91C1C, #7F1D1D); color: white; border: none; border-radius: 20px; padding: 10px 20px; cursor: pointer; font-weight: 600; min-width: 50px; transition: all 0.2s; }
        button:hover { background: linear-gradient(135deg, #DC2626, #991B1B); box-shadow: 0 0 12px rgba(255, 30, 30, 0.4); }
        button:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; }
        .error { background: rgba(180, 30, 30, 0.2); color: #FF6060; padding: 8px 12px; border-radius: 8px; font-size: 12px; margin: 4px 16px; border: 1px solid rgba(180, 30, 30, 0.3); }
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 32px; }
        .empty-state img { width: 120px; height: 120px; border-radius: 50%; margin-bottom: 20px; box-shadow: 0 0 25px rgba(255, 40, 40, 0.4); }
        .empty-state p { font-size: 20px; color: #ff4040; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-icon"></div>
            <h1>Альтрон</h1>
        </div>
        <div class="chat-box" id="chatBox">
            <div class="empty-state" id="emptyState">
                <img src="/avatar.gif" alt="Альтрон">
                <p>С чем пожаловал?</p>
            </div>
        </div>
        <div id="errorBox"></div>
        <div class="input-section">
            <input type="text" id="messageInput" placeholder="Напиши что-нибудь..." autocomplete="off">
            <button id="sendBtn">➜</button>
        </div>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#0A0A0F');
        tg.setBackgroundColor('#0A0A0F');
        const chatBox = document.getElementById('chatBox');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const errorBox = document.getElementById('errorBox');
        let isFirstMessage = true;
        let chatHistory = [];

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;
            if (isFirstMessage) { chatBox.innerHTML = ''; isFirstMessage = false; }
            addMessage(text, 'user');
            chatHistory.push({ role: 'user', content: text });
            messageInput.value = '';
            sendBtn.disabled = true;
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message ai';
            typingDiv.innerHTML = '<div class="typing-indicator"><img src="/thinking.gif" alt="думаю..."><span>Альтрон думает...</span></div>';
            chatBox.appendChild(typingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, history: chatHistory.slice(-20) })
                });
                const data = await response.json();
                typingDiv.remove();
                if (!response.ok) throw new Error(data.error?.message || JSON.stringify(data));
                addMessage(data.reply, 'ai');
                chatHistory.push({ role: 'assistant', content: data.reply });
            } catch (error) {
                typingDiv.remove();
                showError(error.message);
            } finally {
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + sender;
            const escaped = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            messageDiv.innerHTML = '<div class="message-content">' + escaped + '</div>';
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showError(message) {
            const error = document.createElement('div');
            error.className = 'error';
            error.textContent = message;
            errorBox.appendChild(error);
            setTimeout(() => error.remove(), 5000);
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });
    </script>
</body>
</html>
